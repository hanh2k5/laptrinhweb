<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Lập trình web</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; font-size: 14px; background: #fff; }

    nav {
      border: 1px solid #ccc;
      padding: 8px 0;
      text-align: center;
      margin-bottom: 30px;
    }
    nav a { text-decoration: none; color: #333; margin: 0 8px; }
    nav a.active { font-weight: bold; }
    nav span { color: #333; }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 120px);
    }

    .form-box {
      border: 1px solid #ccc;
      padding: 30px 40px;
      width: 340px;
    }

    .form-box h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 16px;
      font-weight: bold;
    }

    .form-group {
      display: flex;
      align-items: center;
      margin-bottom: 14px;
    }

    .form-group label {
      width: 80px;
      font-size: 13px;
    }

    .form-group input[type="text"],
    .form-group input[type="password"] {
      flex: 1;
      border: 1px solid #999;
      padding: 4px 6px;
      font-size: 13px;
      height: 26px;
    }

    .remember {
      display: flex;
      align-items: center;
      margin-left: 80px;
      margin-bottom: 16px;
      font-size: 13px;
      gap: 6px;
    }

    .remember input { accent-color: #1a73e8; }

    .actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
    }

    .actions a {
      font-size: 13px;
      color: #1a73e8;
      text-decoration: none;
    }

    .btn-primary {
      background: #1a73e8;
      color: #fff;
      border: none;
      padding: 6px 16px;
      font-size: 13px;
      cursor: pointer;
      border-radius: 2px;
    }

    footer {
      border: 1px solid #ccc;
      text-align: center;
      padding: 8px;
      font-size: 13px;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <nav>
    <a href="#">Home</a><span>|</span>
    <a href="login.html" class="active">Đăng nhập</a><span>|</span>
    <a href="register.html">Đăng ký</a>
  </nav>

  <div class="container">
    <div class="form-box">
      <h2>Màn hình đăng nhập</h2>
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username">
      </div>
      <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password" name="password">
      </div>
      <div class="remember">
        <input type="checkbox" id="remember" checked>
        <label for="remember">Ghi nhớ đăng nhập</label>
      </div>
      <div class="actions">
        <a href="#">Quên mật khẩu</a>
        <button class="btn-primary">Đăng nhập</button>
      </div>
    </div>
  </div>

  <footer>Lập trình web @01/2024</footer>
</body>
</html>
